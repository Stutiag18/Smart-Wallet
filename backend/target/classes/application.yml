server:
  port: 8081
  error:
    include-message: always
    include-stacktrace: never

spring:
  application:
    name: smart-wallet-backend

  # PostgreSQL - financial data
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_wallet_db
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: false  # temporarily disabled until Flyway version is aligned with PostgreSQL 14.20
    locations: classpath:db/migration
    baseline-on-migrate: true

  # MongoDB & Redis
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/smart_wallet_onboarding}
      database: smart_wallet_onboarding
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # SMTP Configuration (Brevo)
  # SMTP Configuration (Brevo)
  # SMTP Configuration (Brevo)
  mail:
    host: smtp-relay.brevo.com
    port: 465
    username: a60773001@smtp-brevo.com
    password: "xsmtpsib-eefb58650ee9def4ca18fcc3f0fe9ee031486f19181c2cb165d1e3b958f891ad-izQms3PHT7RvYNDY"
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          ssl:
            enable: true
          # socketFactory is required for SSL on port 465
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

