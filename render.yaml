services:
  # The Backend Web Service
  - type: web
    name: smart-wallet-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free # Change to starter or higher for production
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8081
      # PostgreSQL Mapping (Constructing JDBC URL from parts)
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - key: DB_HOST
        fromDatabase:
          name: smart-wallet-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smart-wallet-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: smart-wallet-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smart-wallet-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smart-wallet-db
          property: password
      # Redis Mapping
      - key: REDIS_HOST
        fromStackResource:
          type: redis
          name: smart-wallet-redis
          property: host
      - key: REDIS_PORT
        fromStackResource:
          type: redis
          name: smart-wallet-redis
          property: port
      - key: REDIS_PASSWORD
        sync: false # Managed Redis might not need this, but good to have
      # MongoDB Mapping (Atlas URI recommended)
      - key: MONGODB_URI
        sync: false # Set in Render Dashboard secrets
      # SMTP (Brevo)
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

databases:
  # Managed PostgreSQL
  - name: smart-wallet-db
    databaseName: smart_wallet_db
    user: postgres
    plan: free

redis:
  # Managed Redis
  - name: smart-wallet-redis
    plan: free
    ipAllowList: [] # Only allow internal access
