services:
  - type: web
    name: smart-wallet-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: smart-wallet-db
          property: connectionString
      - key: SERVER_PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set this in Render dashboard (Atlas URI)
      - key: REDIS_HOST
        sync: false # Set this in Render dashboard
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

databases:
  - name: smart-wallet-db
    databaseName: smart_wallet_db
    user: smart_wallet_user
    plan: free
    region: singapore
