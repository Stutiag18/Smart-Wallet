services:
  - type: web
    name: smart-wallet-backend
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: smart-wallet-db
          property: connectionString
      - key: SERVER_PORT
        value: 8081

databases:
  - name: smart-wallet-db
    databaseName: smart_wallet_db
    user: smart_wallet_user
    plan: free
    region: singapore
