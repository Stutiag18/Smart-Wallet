services:
  # The Backend Web Service
  - type: web
    name: smart-wallet-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free # Change to starter or higher for production
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8081
      # PostgreSQL Mapping (Constructing JDBC URL from parts)
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - key: DB_HOST
        fromDatabase:
          name: smart-wallet-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smart-wallet-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: smart-wallet-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smart-wallet-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smart-wallet-db
          property: password
      # Redis Mapping
      - key: REDIS_HOST
        fromStackResource:
          type: redis
          name: smart-wallet-redis
          property: host
      - key: REDIS_PORT
        fromStackResource:
          type: redis
          name: smart-wallet-redis
          property: port
      # MongoDB Mapping (Automatic via private service below)
      - key: MONGODB_URI
        value: mongodb://smart-wallet-mongo:27017/smart_wallet_onboarding
      # Redis Password (optional, leave blank for Render Managed)
      - key: REDIS_PASSWORD
        value: ""
      # SMTP (Brevo) - Required for email alerts, but app will start without them
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # MongoDB as a Private Service (Automatic)
  - type: pserv
    name: smart-wallet-mongo
    env: docker
    dockerContext: .
    dockerfileInline: |
      FROM mongo:6.0
      EXPOSE 27017
    plan: free
    disk:
      name: mongo-data
      mountPath: /data/db
      sizeGB: 1

databases:
  # Managed PostgreSQL (Automatic)
  - name: smart-wallet-db
    databaseName: smart_wallet_db
    user: postgres
    plan: free

redis:
  # Managed Redis (Automatic)
  - name: smart-wallet-redis
    plan: free
    ipAllowList: [] # Only allow internal access
