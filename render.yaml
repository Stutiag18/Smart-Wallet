services:
  # The Backend Web Service
  - type: web
    name: smart-wallet-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend.Dockerfile
    plan: free # Change to starter or higher for production
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8081
      # PostgreSQL Mapping
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - key: DB_HOST
        fromDatabase:
          name: smart-wallet-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smart-wallet-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: smart-wallet-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smart-wallet-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smart-wallet-db
          property: password
      # Redis Mapping (Updated to match keyvalue service type)
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: smart-wallet-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: smart-wallet-redis
          property: port
      # MongoDB Mapping
      - key: MONGODB_URI
        value: mongodb://smart-wallet-mongo:27017/smart_wallet_onboarding
      - key: REDIS_PASSWORD
        value: "" # Managed Redis on Render usually doesn't have a password set in Blueprint
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # MongoDB as a Private Service (No disk for Free Tier)
  - type: pserv
    name: smart-wallet-mongo
    env: image
    image:
      url: mongo:6.0
    plan: free

  # Managed Redis (Automatic) - Defined as a service
  - type: keyvalue
    name: smart-wallet-redis
    plan: free
    ipAllowList: [] # Only allow internal access

databases:
  # Managed PostgreSQL (Automatic)
  - name: smart-wallet-db
    databaseName: smart_wallet_db
    plan: free
