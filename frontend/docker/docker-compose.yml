version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    container_name: smart_wallet_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_wallet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: smart_wallet_mongo
    environment:
      MONGO_INITDB_DATABASE: smart_wallet_onboarding
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart_wallet_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: smart_wallet_adminer
    ports:
      - "8080:8080"
    restart: always

  mailpit:
    image: axllent/mailpit:latest
    container_name: smart_wallet_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: always

volumes:
  postgres_data:
  mongo_data:

